version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pizza_mysql
    restart: always
    environment:
      MYSQL_DATABASE: 'pizza_db'
      MYSQL_USER: 'nazar'
      MYSQL_PASSWORD: 'your_password'
      MYSQL_ROOT_PASSWORD: 'your_root_password'
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: